<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create User - Bravo Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="admin-body">
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center">
                    <span class="text-primary fw-bold brand-text">Bravo</span>
                    <span class="badge bg-primary-subtle text-primary ms-2 brand-text">Admin</span>
                </div>
            </div>
            <ul class="admin-menu">
                <li>
                    <a href="dashboard.html">
                        <i class="bi bi-speedometer2"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="products.html">
                        <i class="bi bi-box-seam"></i>
                        <span>Products</span>
                    </a>
                </li>
                <li>
                    <a href="categories.html">
                        <i class="bi bi-grid"></i>
                        <span>Categories</span>
                    </a>
                </li>
                <li>
                    <a href="orders.html">
                        <i class="bi bi-receipt"></i>
                        <span>Orders</span>
                    </a>
                </li>
                <li>
                    <a href="users.html">
                        <i class="bi bi-people"></i>
                        <span>Users</span>
                    </a>
                </li>
                <li>
                    <a href="form.html" class="active">
                        <i class="bi bi-ui-checks-grid"></i>
                        <span>Form</span>
                    </a>
                </li>
                <li>
                    <a href="../index.html">
                        <i class="bi bi-box-arrow-left"></i>
                        <span>Logout</span>
                    </a>
                </li>
            </ul>
            <div class="admin-sidebar-footer">
                <span>Static admin form layout example.</span>
            </div>
        </aside>

        <!-- Main area -->
        <div class="admin-main">
            <header class="admin-topbar d-flex justify-content-between align-items-center">
                <button class="btn btn-sm btn-outline-secondary admin-sidebar-toggle" type="button">
                    <i class="bi bi-layout-sidebar-inset"></i>
                </button>
                <div class="d-flex align-items-center gap-3">
                    <span class="text-muted small d-none d-sm-inline">Create New User</span>
                    <div class="user-pill d-flex align-items-center">
                        <span class="badge bg-primary-subtle text-primary me-2">BA</span>
                        <span>Admin User</span>
                    </div>
                </div>
            </header>

            <main class="admin-content">
                <div class="d-flex flex-wrap justify-content-between align-items-center mb-3">
                    <div>
                        <h1 class="h5 mb-1">Create New User</h1>
                        <small class="text-muted">Static form to demonstrate how a user creation flow would look.</small>
                    </div>
                    <div class="d-flex flex-wrap gap-2 mt-2 mt-sm-0">
                        <button class="btn btn-outline-secondary btn-sm">
                            <i class="bi bi-arrow-counterclockwise me-1"></i> Reset (UI)
                        </button>
                    </div>
                </div>

                <div class="card admin-table-card">
                    <div class="card-body">
                        <form>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="userName" class="form-label">Full Name</label>
                                    <input type="text" class="form-control" id="userName" placeholder="Jane Cooper">
                                </div>
                                <div class="col-md-6">
                                    <label for="userEmail" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="userEmail" placeholder="jane.cooper@example.com">
                                </div>
                                <div class="col-md-4">
                                    <label for="userRole" class="form-label">Role</label>
                                    <select id="userRole" class="form-select">
                                        <option selected>Customer</option>
                                        <option>Manager</option>
                                        <option>Admin</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label for="userStatus" class="form-label">Status</label>
                                    <select id="userStatus" class="form-select">
                                        <option selected>Active</option>
                                        <option>Pending</option>
                                        <option>Suspended</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label for="userPhone" class="form-label">Phone (optional)</label>
                                    <input type="tel" class="form-control" id="userPhone" placeholder="+1 (000) 000-0000">
                                </div>
                                <div class="col-12">
                                    <label for="userNotes" class="form-label">Notes</label>
                                    <textarea id="userNotes" class="form-control" rows="3" placeholder="Internal notes about this user (UI only)."></textarea>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Password</label>
                                    <div class="form-check">
                                        <input type="password" class="form-control" id="userPassword" placeholder="Create a password">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Confirm Password</label>
                                    <input type="password" class="form-control" id="userPasswordConfirm" placeholder="Re-enter password">
                                </div>
                                <div class="col-12">
                                    <label class="form-label">Preferences</label>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="prefNewsletter" checked>
                                        <label class="form-check-label" for="prefNewsletter">
                                            Subscribe user to marketing emails
                                        </label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="prefTwoFactor">
                                        <label class="form-check-label" for="prefTwoFactor">
                                            Require two-factor authentication
                                        </label>
                                    </div>
                                </div>
                            </div>
                            <hr class="my-4">
                            <div class="d-flex justify-content-end gap-2">
                                <button type="button" class="btn btn-outline-secondary">Cancel</button>
                                <button type="button" class="btn btn-primary">Save (UI only)</button>
                            </div>
                        </form>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
